name: Publish · Backend image

on:
  push:
    branches: [main]
    paths:
      - "wpp-flows-services/**"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to push alongside the SHA (default: latest)"
        required: false
        default: "latest"

concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  IMAGE: medinavs/wpp-flows-services

jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      extra_tag: ${{ steps.meta.outputs.extra_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${{ inputs.tag || 'latest' }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./wpp-flows-services
          file: ./wpp-flows-services/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE }}:${{ steps.meta.outputs.extra_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize
        run: |
          {
            echo "### Image published"
            echo ""
            echo "| Tag | Reference |"
            echo "|-----|-----------|"
            echo "| SHA | \`${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}\` |"
            echo "| Extra | \`${{ env.IMAGE }}:${{ steps.meta.outputs.extra_tag }}\` |"
            echo ""
            echo "Pin in \`hml.env\`:"
            echo ""
            echo "\`\`\`"
            echo "APP_IMAGE_TAG=${{ steps.meta.outputs.sha }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "✅ Published ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}"
          echo "✅ Published ${{ env.IMAGE }}:${{ steps.meta.outputs.extra_tag }}"

  deploy-coolify:
    name: Deploy to Coolify (HML)
    needs: build-push
    runs-on: ubuntu-latest
    environment: hml

    steps:
      - name: Update APP_IMAGE_TAG env on Coolify
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          NEW_TAG: ${{ needs.build-push.outputs.sha }}
        run: |
          set -euo pipefail
          echo "→ Pointing APP_IMAGE_TAG at $NEW_TAG"
          # Capture both body and HTTP status so we can fail loud on non-2xx.
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            "$COOLIFY_URL/api/v1/applications/$COOLIFY_APP_UUID/envs" \
            -d "{
              \"key\": \"APP_IMAGE_TAG\",
              \"value\": \"$NEW_TAG\",
              \"is_preview\": false,
              \"is_build_time\": false,
              \"is_literal\": false
            }")
          echo "  status=$status"
          cat "$response"
          echo ""
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Coolify env update failed with status $status"
            exit 1
          fi

      - name: Trigger Coolify redeploy
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -euo pipefail
          echo "→ Triggering redeploy of $COOLIFY_APP_UUID"
          response=$(mktemp)
          # force=true so Coolify always re-pulls the image (the tag stayed
          # the same lexically if we kept :latest, but we just changed the
          # APP_IMAGE_TAG var which docker-compose will substitute on up).
          status=$(curl -sS -o "$response" -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=true")
          echo "  status=$status"
          cat "$response"
          echo ""
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Coolify deploy trigger failed with status $status"
            exit 1
          fi

      - name: Summarize
        run: |
          {
            echo "### Deployed to Coolify"
            echo ""
            echo "- App UUID: \`${{ secrets.COOLIFY_APP_UUID }}\`"
            echo "- APP_IMAGE_TAG → \`${{ needs.build-push.outputs.sha }}\`"
            echo "- Redeploy triggered. Tail the build log in Coolify."
          } >> "$GITHUB_STEP_SUMMARY"
