name: Publish · Backend image

on:
  push:
    branches: [main]
    paths:
      - "wpp-flows-services/**"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to push alongside the SHA (default: latest)"
        required: false
        default: "latest"

concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  IMAGE: medinavs/wpp-flows-services

jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      extra_tag: ${{ steps.meta.outputs.extra_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${{ inputs.tag || 'latest' }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./wpp-flows-services
          file: ./wpp-flows-services/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE }}:${{ steps.meta.outputs.extra_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize
        run: |
          {
            echo "### Image published"
            echo ""
            echo "| Tag | Reference |"
            echo "|-----|-----------|"
            echo "| SHA | \`${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}\` |"
            echo "| Extra | \`${{ env.IMAGE }}:${{ steps.meta.outputs.extra_tag }}\` |"
            echo ""
            echo "Pin in \`hml.env\`:"
            echo ""
            echo "\`\`\`"
            echo "APP_IMAGE_TAG=${{ steps.meta.outputs.sha }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "✅ Published ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}"
          echo "✅ Published ${{ env.IMAGE }}:${{ steps.meta.outputs.extra_tag }}"

  deploy-coolify:
    name: Deploy to Coolify (HML)
    needs: build-push
    runs-on: ubuntu-latest
    environment: hml

    steps:
      - name: Update APP_IMAGE_TAG env on Coolify
        env:
          COOLIFY_URL_RAW: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN_RAW: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID_RAW: ${{ secrets.COOLIFY_APP_UUID }}
          NEW_TAG: ${{ needs.build-push.outputs.sha }}
        run: |
          set -euo pipefail
          COOLIFY_URL=$(printf '%s' "$COOLIFY_URL_RAW" | tr -d '\r\n' | sed 's/[[:space:]]*$//' | sed 's|/*$||')
          COOLIFY_TOKEN=$(printf '%s' "$COOLIFY_TOKEN_RAW" | tr -d '\r\n' | sed 's/[[:space:]]*$//')
          COOLIFY_APP_UUID=$(printf '%s' "$COOLIFY_APP_UUID_RAW" | tr -d '\r\n' | sed 's/[[:space:]]*$//')

          if [ -z "$COOLIFY_URL" ] || [ -z "$COOLIFY_TOKEN" ] || [ -z "$COOLIFY_APP_UUID" ]; then
            echo "::error::One or more Coolify secrets are empty. Check Settings → Environments → hml."
            exit 1
          fi

          target="$COOLIFY_URL/api/v1/applications/$COOLIFY_APP_UUID/envs"
          echo "→ PATCH $target"
          echo "→ APP_IMAGE_TAG = $NEW_TAG"

          response=$(mktemp)
          status=$(curl -sS -o "$response" -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            "$target" \
            -d "{\"key\":\"APP_IMAGE_TAG\",\"value\":\"$NEW_TAG\"}")
          echo "  status=$status"
          cat "$response"
          echo ""
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Coolify env update failed with status $status"
            exit 1
          fi

      - name: Trigger Coolify redeploy
        env:
          COOLIFY_URL_RAW: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN_RAW: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID_RAW: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -euo pipefail
          COOLIFY_URL=$(printf '%s' "$COOLIFY_URL_RAW" | tr -d '\r\n' | sed 's/[[:space:]]*$//' | sed 's|/*$||')
          COOLIFY_TOKEN=$(printf '%s' "$COOLIFY_TOKEN_RAW" | tr -d '\r\n' | sed 's/[[:space:]]*$//')
          COOLIFY_APP_UUID=$(printf '%s' "$COOLIFY_APP_UUID_RAW" | tr -d '\r\n' | sed 's/[[:space:]]*$//')

          target="$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=true"
          echo "→ GET $target"

          response=$(mktemp)
          # force=true so Coolify always re-pulls the image even if the tag
          # alone wouldn't produce a layer diff (we just set APP_IMAGE_TAG
          # which docker-compose substitutes on `up`).
          status=$(curl -sS -o "$response" -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$target")
          echo "  status=$status"
          cat "$response"
          echo ""
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Coolify deploy trigger failed with status $status"
            exit 1
          fi

      - name: Summarize
        run: |
          {
            echo "### Deployed to Coolify"
            echo ""
            echo "- App UUID: \`${{ secrets.COOLIFY_APP_UUID }}\`"
            echo "- APP_IMAGE_TAG → \`${{ needs.build-push.outputs.sha }}\`"
            echo "- Redeploy triggered. Tail the build log in Coolify."
          } >> "$GITHUB_STEP_SUMMARY"
