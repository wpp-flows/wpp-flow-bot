name: Publish · Backend image

on:
  push:
    branches: [main]
    paths:
      - "wpp-flows-services/**"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to push alongside the SHA (default: latest)"
        required: false
        default: "latest"

concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  IMAGE: medinavs/wpp-flows-services

jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "extra_tag=${{ inputs.tag || 'latest' }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./wpp-flows-services
          file: ./wpp-flows-services/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE }}:${{ steps.meta.outputs.extra_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize
        run: |
          {
            echo "### Image published"
            echo ""
            echo "| Tag | Reference |"
            echo "|-----|-----------|"
            echo "| SHA | \`${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}\` |"
            echo "| Extra | \`${{ env.IMAGE }}:${{ steps.meta.outputs.extra_tag }}\` |"
            echo ""
            echo "Pin in \`hml.env\`:"
            echo ""
            echo "\`\`\`"
            echo "APP_IMAGE_TAG=${{ steps.meta.outputs.sha }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "✅ Published ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}"
          echo "✅ Published ${{ env.IMAGE }}:${{ steps.meta.outputs.extra_tag }}"
