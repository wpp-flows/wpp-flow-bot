services:
  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wpp-flows-network

  evolution-api:
    image: ${EVOLUTION_IMAGE}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - evolution-data:/evolution/instances
    networks:
      - wpp-flows-network

  app:
    image: ${APP_IMAGE}:${APP_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
    env_file:
      - .env
    environment:
      SERVICE_FQDN_APP_8080: ${SERVICE_FQDN_APP_8080}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wpp-flows-network
      - coolify

volumes:
  redis-data:
  evolution-data:
networks:
  wpp-flows-network:
    driver: bridge
  coolify:
    external: true
