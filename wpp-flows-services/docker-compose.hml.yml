services:
  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  evolution-api:
    image: ${EVOLUTION_IMAGE}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - evolution-data:/evolution/instances

  app:
    image: ${APP_IMAGE}:${APP_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
    env_file:
      - .env
    expose:
      - "${APP_PORT}"

volumes:
  redis-data:
  evolution-data:
