services:
  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--user",
        "default on >123 ~* &* +@all"
      ]
    volumes:
      - redis-data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wpp-flows-network

  evolution-api:
    image: ${EVOLUTION_IMAGE}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - evolution-data:/evolution/instances
    networks:
      - wpp-flows-network

  app:
    image: ${APP_IMAGE}:${APP_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
    env_file:
      - .env
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - wpp-flows-network
      - coolify
    labels:
      - traefik.docker.network=coolify

volumes:
  redis-data:
  evolution-data:
networks:
  wpp-flows-network:
    driver: bridge
  coolify:
    external: true
