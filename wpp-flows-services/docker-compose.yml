services:
  postgres:
    image: postgres:17-alpine
    container_name: wpp-flows-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wpp_flows
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wpp_flows"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wpp-flows-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wpp-flows-services
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${APP_PORT:-8080}
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/wpp_flows?schema=public}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-NKyP4cihK94XzTb6VDZLvJ6qdpzPbTxL}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:8080}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # isso aqui nao vai rodar em dev de qlqr forma, só deixei pra nao quebrar build
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET}
      # WhatsApp Cloud API (Meta) — passados do host/.env. Todos opcionais pro
      # boot: a plataforma sobe sem eles, mas o Embedded Signup e o envio de
      # mensagens só funcionam com eles preenchidos. Onde achar cada um: README.
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_SYSTEM_USER_TOKEN: ${META_SYSTEM_USER_TOKEN}
      META_EMBEDDED_SIGNUP_CONFIG_ID: ${META_EMBEDDED_SIGNUP_CONFIG_ID}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v21.0}
      META_PHONE_REGISTER_PIN: ${META_PHONE_REGISTER_PIN:-152663}
      WHATSAPP_TOKEN_ENC_KEY: ${WHATSAPP_TOKEN_ENC_KEY}
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  redis-data:
