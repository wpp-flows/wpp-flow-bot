services:
  postgres:
    image: postgres:17-alpine
    container_name: wpp-flows-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wpp_flows
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wpp_flows"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wpp-flows-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    # API no host (npm run qa:api): webhooks em host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-dev-evolution-key}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/evolution?schema=public
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_VERSION: 2.3000.1038839325
      CONFIG_SESSION_PHONE_CLIENT: Chrome
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: 30
      QRCODE_COLOR: "#198754"
    volumes:
      - evolution_instances:/evolution/instances

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wpp-flows-services
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${APP_PORT:-8080}
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/wpp_flows?schema=public}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-NKyP4cihK94XzTb6VDZLvJ6qdpzPbTxL}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:8080}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-dev-evolution-key}
      EVOLUTION_WEBHOOK_URL: http://app:8080
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # isso aqui nao vai rodar em dev de qlqr forma, só deixei pra nao quebrar build
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET}
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  redis-data:
  evolution_instances:
